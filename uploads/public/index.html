<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Joshua Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <h2>🎮 Joshua Studio</h2>

  <div class="nav-right">
    <input id="search" placeholder="Search games...">
    <button onclick="login()">Login</button>
    <button id="themeToggle">🌓</button>
  </div>
</nav>

<header class="hero">
  <h1>My Game Studio</h1>
  <p>Games I build while figuring things out</p>
</header>

<!-- GAME LIST -->
<section id="games" class="games"></section>

<!-- ADD GAME (only works if logged in as admin) -->
<div class="add-box">
  <h3>Add Game (Admin only)</h3>
  <input id="name" placeholder="Game name">
  <input id="desc" placeholder="Description">

  <input type="file" id="image">

  <button onclick="addGame()">Add Game</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h2 id="modalTitle"></h2>
    <p id="modalDesc"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<footer>
  <p>© 2026 Joshua Studio</p>
</footer>

<script src="script.js"></script>
</body>
</html>
